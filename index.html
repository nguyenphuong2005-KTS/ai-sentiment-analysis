<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CX Insight Analytics - Phương</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2>📊 CX Insight Analytics</h2>
        <textarea id="userInput" rows="5" placeholder="Nhập phản hồi khách hàng..."></textarea>
        <button id="submitBtn" onclick="analyzeSentiment()">PHÂN TÍCH CHIẾN LƯỢC 🚀</button>

        <div id="resultArea" class="result-card">
            <div id="sentimentLabel" class="sentiment-badge"></div>
            <div id="starRating" class="stars"></div>
            <div class="reply-box">
                <strong>Phản hồi gợi ý từ AI:</strong><br>
                <span id="aiReply"></span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
