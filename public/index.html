<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis - Phuong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Phân Tích Cảm Xúc 🤖</h1>
        <p class="desc">Dự án cuối kỳ - SV Nguyễn Ngọc Bình Phương</p>
        
        <textarea id="userInput" placeholder="Nhập phản hồi khách hàng..."></textarea>
        
        <button id="analyzeBtn">PHÂN TÍCH</button>

        <div id="loader" class="hidden">🔄 Đang xử lý...</div>
        
        <div id="resultBox" class="hidden">
            <h3>Kết quả từ AI:</h3>
            <p id="aiResponse"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
